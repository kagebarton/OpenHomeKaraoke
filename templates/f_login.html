<header class="title">
<h1>Login</h1>
</header>

<div class="content">
  <p>Enter the administrator password</p>
  <form action="{{ url_for('auth') }}" method="post">
    <div class="field has-addons" style="margin-bottom: 5px">
      <div class="control" style="width:100%; max-width:350px">
        <input type="password" name="admin-password" class="input">
      </div>
      <div class="control">
        <button class="button is-rounded">Login</button>
      </div>
    </div>
  </form>
</div>
